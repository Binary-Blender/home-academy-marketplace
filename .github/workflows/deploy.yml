name: Deploy marketplace site

# Rebuild + deploy the static discovery site whenever the lesson library
# changes. Approving a lesson (which commits to lessons/ + manifest.json)
# therefore auto-publishes the site — no manual step.
on:
  push:
    branches: [main]
    paths:
      - 'lessons/**'
      - 'manifest.json'
      - 'build.mjs'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: node build.mjs
      - name: Deploy
        run: npx --yes wrangler@3 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
